controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - joint_1
      - joint_2
      - joint_3
    write_op_modes:
      - position
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

gripper_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - left_finger_joint
      - right_finger_joint
    write_op_modes:
      - position
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
